apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: python-app
  template:
    metadata:
      labels:
        app: python-app
    spec:
      containers:
        - name: python-app
          image:image: 135234114190.dkr.ecr.eu-north-1.amazonaws.com/python-devsecops-app:latest
          ports:
            - containerPort: 5000
